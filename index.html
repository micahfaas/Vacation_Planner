<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trip Planner</title>
<meta name="theme-color" content="#1d8a9c" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.17.0/dist/tabler-icons.min.css" />
</head>
<body>
<header class="vp-header">
  <h1>Trip planner</h1>
  <div class="vp-header-actions">
    <button id="vp-trips-btn" class="vp-btn-ghost" title="Switch trip"><i class="ti ti-map-2" aria-hidden="true"></i> <span id="vp-trip-name">Trip</span></button>
    <button id="vp-coplan-btn" class="vp-btn-ghost" title="Trip co-planner" aria-label="Trip co-planner"><i class="ti ti-sparkles" aria-hidden="true"></i></button>
    <button id="vp-reminders-btn" class="vp-btn-ghost" title="Booking reminders" aria-label="Booking reminders"><i class="ti ti-bell" aria-hidden="true"></i></button>
    <button id="vp-import-btn" class="vp-btn-ghost" title="Import bookings" aria-label="Import bookings"><i class="ti ti-upload" aria-hidden="true"></i></button>
    <button id="vp-export-btn" class="vp-btn-ghost" title="Export JSON" aria-label="Export JSON"><i class="ti ti-download" aria-hidden="true"></i></button>
    <button id="vp-ics-btn" class="vp-btn-ghost" title="Export to calendar (.ics)" aria-label="Export to calendar (.ics)"><i class="ti ti-calendar-down" aria-hidden="true"></i></button>
    <button id="vp-currency-btn" class="vp-btn-ghost" title="Currency converter" aria-label="Currency converter"><i class="ti ti-coins" aria-hidden="true"></i></button>
    <button id="vp-account-btn" class="vp-btn-ghost" title="Account" hidden><i class="ti ti-user-circle" aria-hidden="true"></i> <span id="vp-account-email"></span></button>
  </div>
</header>

<main id="vp-root" class="vp-wrap">
  <div class="vp-loading">Loading planner…</div>
</main>

<footer class="vp-footer">
  Synced to your account. Export a trip to back it up or share it.
</footer>

<script type="module" src="/src/main.js"></script>
</body>
</html>
